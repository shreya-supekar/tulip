<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Insect Flight & Magic</title>
    
    <!-- A-Frame 1.5.0 library -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
        // =========================================================================
        // DYNAMIC ATMOSPHERE & ENVIRONMENT
        // =========================================================================

        AFRAME.registerShader('sky-gradient', {
            schema: {
                colorTop: { type: 'color', default: '#90CAF9', is: 'uniform' },
                colorBottom: { type: 'color', default: '#E3F2FD', is: 'uniform' }
            },
            vertexShader: `varying vec3 vWorldPosition; void main() { vec4 worldPosition = modelMatrix * vec4(position, 1.0); vWorldPosition = worldPosition.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `uniform vec3 colorTop; uniform vec3 colorBottom; varying vec3 vWorldPosition; void main() { vec3 pointOnSphere = normalize(vWorldPosition.xyz); float f = (pointOnSphere.y + 1.0) / 2.0; f = smoothstep(0.1, 0.7, f); gl_FragColor = vec4(mix(colorBottom, colorTop, f), 1.0); }`
        });

        AFRAME.registerComponent('starry-sky', {
            init: function() {
                const count = 1500;
                const geo = new THREE.BufferGeometry();
                const pos = new Float32Array(count * 3);
                for(let i=0; i<count*3; i+=3) {
                    let vec = new THREE.Vector3(
                        (Math.random() - 0.5) * 2,
                        (Math.random() - 0.5) * 2,
                        (Math.random() - 0.5) * 2
                    ).normalize().multiplyScalar(400); // 400m radius envelope
                    pos[i] = vec.x; pos[i+1] = vec.y; pos[i+2] = vec.z;
                }
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const mat = new THREE.PointsMaterial({color: '#FFFFFF', size: 1.5, transparent: true, opacity: 0.0});
                this.points = new THREE.Points(geo, mat);
                this.el.setObject3D('mesh', this.points);
            }
        });

        AFRAME.registerComponent('day-night-cycle', {
            schema: { duration: { type: 'number', default: 120000 } }, // 2 Minute Cycle
            init: function() {
                // STRICTLY CONFIGURED COLOR PALETTE
                this.phases = [
                    // Morning (soft pale blue, slightly warm horizon)
                    { pct: 0.00, top: '#87AFC7', bot: '#F2E8D5', fog: '#E8E2D3', amb: '#B8C2CC', sunCol: '#FFE8B5', sunInt: 1.2, moonCol: '#AFC8FF', moonInt: 0.0 },
                    // Late Morning (clear daylight blue)
                    { pct: 0.20, top: '#6FA9D8', bot: '#D7E6F2', fog: '#D7E6F2', amb: '#C2CCD6', sunCol: '#FFF4D6', sunInt: 1.35, moonCol: '#AFC8FF', moonInt: 0.0 },
                    // Afternoon (deep but natural sky blue)
                    { pct: 0.35, top: '#4F8FC4', bot: '#C6DFF2', fog: '#C6DFF2', amb: '#C7D1DA', sunCol: '#FFFFFF', sunInt: 1.5, moonCol: '#AFC8FF', moonInt: 0.0 },
                    // Sunset (desaturated lavender / warm haze)
                    { pct: 0.50, top: '#6E79A8', bot: '#E7BFA6', fog: '#E1B8A0', amb: '#9B90A8', sunCol: '#FFB98A', sunInt: 0.9, moonCol: '#AFC8FF', moonInt: 0.1 },
                    // Night (deep atmospheric navy, never black)
                    { pct: 0.75, top: '#0E1B2F', bot: '#1A2C44', fog: '#1A2C44', amb: '#2C3A52', sunCol: '#FF8844', sunInt: 0.0, moonCol: '#C9D9FF', moonInt: 0.85 },
                    // Dawn (cool blue with faint warm horizon)
                    { pct: 0.90, top: '#6E7FAE', bot: '#E9C7B2', fog: '#E6C2AC', amb: '#9E95AC', sunCol: '#FFD7A8', sunInt: 0.75, moonCol: '#C9D9FF', moonInt: 0.2 },
                    // Loop to Morning
                    { pct: 1.00, top: '#87AFC7', bot: '#F2E8D5', fog: '#E8E2D3', amb: '#B8C2CC', sunCol: '#FFE8B5', sunInt: 1.2, moonCol: '#AFC8FF', moonInt: 0.0 }
                ];
                this.c1 = new THREE.Color(); 
                this.c2 = new THREE.Color();
            },
            tick: function(time) {
                if (!this.sun) this.sun = document.querySelector('#orbiting-sun');
                if (!this.moon) this.moon = document.querySelector('#orbiting-moon');
                if (!this.dirLight) this.dirLight = document.querySelector('#sun-light');
                if (!this.moonLight) this.moonLight = document.querySelector('#moon-light');
                if (!this.ambLight) this.ambLight = document.querySelector('#ambient-light');
                if (!this.sky) this.sky = document.querySelector('a-sky');
                if (!this.stars) this.stars = document.querySelector('[starry-sky]');
                
                if (!this.sun || !this.moon || !this.dirLight || !this.moonLight || !this.ambLight || !this.sky || !this.el.sceneEl) return;

                let cycleTime = (time % this.data.duration) / this.data.duration;
                
                let theta = cycleTime * Math.PI * 2;
                let orbitRadius = 250;
                
                this.sun.object3D.position.y = Math.cos(theta) * orbitRadius;
                this.sun.object3D.position.z = Math.sin(theta) * orbitRadius;
                this.dirLight.object3D.position.copy(this.sun.object3D.position);

                this.moon.object3D.position.y = Math.cos(theta + Math.PI) * orbitRadius;
                this.moon.object3D.position.z = Math.sin(theta + Math.PI) * orbitRadius;
                this.moonLight.object3D.position.copy(this.moon.object3D.position);

                let pStart = this.phases[0], pEnd = this.phases[1];
                for(let i=0; i<this.phases.length-1; i++) {
                    if(cycleTime >= this.phases[i].pct && cycleTime <= this.phases[i+1].pct) {
                        pStart = this.phases[i]; pEnd = this.phases[i+1]; break;
                    }
                }

                let range = pEnd.pct - pStart.pct;
                let lerpFactor = (cycleTime - pStart.pct) / range;

                const mixColorHex = (hex1, hex2, f) => {
                    this.c1.set(hex1); this.c2.set(hex2);
                    this.c1.lerp(this.c2, f);
                    return '#' + this.c1.getHexString();
                };

                let topColor = mixColorHex(pStart.top, pEnd.top, lerpFactor);
                let botColor = mixColorHex(pStart.bot, pEnd.bot, lerpFactor);

                this.sky.setAttribute('material', 'colorTop', topColor);
                this.sky.setAttribute('material', 'colorBottom', botColor);

                if (this.el.sceneEl.object3D.fog) {
                    this.el.sceneEl.object3D.fog.color.set(mixColorHex(pStart.fog, pEnd.fog, lerpFactor));
                }

                let dl = this.dirLight.getObject3D('light');
                let ml = this.moonLight.getObject3D('light');
                let al = this.ambLight.getObject3D('light');
                
                if (dl && ml && al) {
                    dl.color.set(mixColorHex(pStart.sunCol, pEnd.sunCol, lerpFactor));
                    dl.intensity = pStart.sunInt + (pEnd.sunInt - pStart.sunInt) * lerpFactor;
                    
                    ml.color.set(mixColorHex(pStart.moonCol, pEnd.moonCol, lerpFactor));
                    ml.intensity = pStart.moonInt + (pEnd.moonInt - pStart.moonInt) * lerpFactor;
                    
                    al.color.set(mixColorHex(pStart.amb, pEnd.amb, lerpFactor));
                }

                if (this.stars && this.stars.getObject3D('mesh')) {
                    let currentSunInt = pStart.sunInt + (pEnd.sunInt - pStart.sunInt) * lerpFactor;
                    let starMat = this.stars.getObject3D('mesh').material;
                    starMat.opacity = Math.max(0, 1.0 - (currentSunInt * 1.5)); 
                }
            }
        });

        AFRAME.registerComponent('milky-clouds', {
            init: function() {
                const cloudCount = 25; this.range = 700;
                const cloudMat = new THREE.MeshLambertMaterial({ color: '#FFFFFF', emissive: '#FFFFFF', emissiveIntensity: 0.15, transparent: true, opacity: 0.85 });
                this.clouds = [];
                for(let i=0; i<cloudCount; i++) {
                    const group = new THREE.Group();
                    group.position.set((Math.random()-0.5)*this.range, Math.random()*40 + 130, (Math.random()-0.5)*this.range);
                    const puffs = Math.floor(Math.random()*5)+6;
                    for(let j=0; j<puffs; j++) {
                        const geo = new THREE.SphereGeometry(Math.random()*20+15, 16, 16);
                        const puff = new THREE.Mesh(geo, cloudMat);
                        puff.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*15, (Math.random()-0.5)*40);
                        group.add(puff);
                    }
                    group.userData.speedX = (Math.random()*0.5 + 0.2) * (Math.random() > 0.5 ? 1 : -1);
                    group.userData.speedZ = (Math.random()*0.5 + 0.2) * (Math.random() > 0.5 ? 1 : -1);
                    this.el.setObject3D('cloud_' + i, group); this.clouds.push(group);
                }
            },
            tick: function(time, timeDelta) {
                if (!this.rig) this.rig = document.querySelector('#rig');
                if (!this.rig || !this.rig.object3D) return;

                let dt = timeDelta / 1000; if (dt > 0.1) dt = 0.1;
                const rigPos = this.rig.object3D.position;

                for(let c of this.clouds) {
                    c.position.x += c.userData.speedX * dt * 5; c.position.z += c.userData.speedZ * dt * 5;
                    let dx = c.position.x - rigPos.x; let dz = c.position.z - rigPos.z;
                    if (dx > this.range/2) c.position.x -= this.range; if (dx < -this.range/2) c.position.x += this.range;
                    if (dz > this.range/2) c.position.z -= this.range; if (dz < -this.range/2) c.position.z += this.range;
                }
            }
        });

        AFRAME.registerComponent('giant-flowers', {
            init: function () {
                const count = 3000; const range = 400; 
                const stemGeo = new THREE.CylinderGeometry(0.3, 0.6, 30, 8); stemGeo.translate(0, 15, 0); 
                const stemMat = new THREE.MeshLambertMaterial({ color: '#5C9E7A' }); const stems = new THREE.InstancedMesh(stemGeo, stemMat, count);
                const bulbGeo = new THREE.SphereGeometry(3, 16, 16); bulbGeo.scale(1, 1.6, 1); bulbGeo.translate(0, 32, 0); 
                const bulbMat = new THREE.MeshLambertMaterial({ color: '#ffffff' }); const bulbs = new THREE.InstancedMesh(bulbGeo, bulbMat, count);
                const dummy = new THREE.Object3D(); const colorObj = new THREE.Color();
                const palette = ['#FF9A8B', '#FFB6C1', '#FFFACD', '#FFD700', '#FF7E67'];
                
                for (let i = 0; i < count; i++) {
                    let x = (Math.random() - 0.5) * range; let z = (Math.random() - 0.5) * range;
                    if (Math.abs(x) < 15 && Math.abs(z) < 15) continue;
                    dummy.position.set(x, -2, z); dummy.rotation.set((Math.random()-0.5)*0.15, Math.random()*Math.PI*2, (Math.random()-0.5)*0.15);
                    let scale = Math.random() * 0.6 + 0.7; dummy.scale.set(scale, scale + (Math.random()*0.3), scale);
                    dummy.updateMatrix(); stems.setMatrixAt(i, dummy.matrix); bulbs.setMatrixAt(i, dummy.matrix);
                    colorObj.set(palette[Math.floor(Math.random() * palette.length)]); bulbs.setColorAt(i, colorObj);
                }
                this.el.setObject3D('stems', stems); this.el.setObject3D('bulbs', bulbs);
            }
        });

        AFRAME.registerComponent('giant-grass', {
            init: function() {
                const count = 15000; const range = 300;
                const grassGeo = new THREE.ConeGeometry(0.4, 12, 4); grassGeo.translate(0, 6, 0);
                const grassMat = new THREE.MeshLambertMaterial({ color: '#4A7C59' }); const grass = new THREE.InstancedMesh(grassGeo, grassMat, count);
                const dummy = new THREE.Object3D();
                
                for(let i=0; i<count; i++) {
                    let x = (Math.random() - 0.5) * range; let z = (Math.random() - 0.5) * range;
                    if (Math.abs(x) < 10 && Math.abs(z) < 10) continue;
                    dummy.position.set(x, -1, z); dummy.rotation.set((Math.random()-0.5)*0.4, Math.random()*Math.PI*2, (Math.random()-0.5)*0.4);
                    dummy.scale.setScalar(Math.random() * 0.5 + 0.5); dummy.updateMatrix(); grass.setMatrixAt(i, dummy.matrix);
                }
                this.el.setObject3D('grass', grass);
            }
        });

        AFRAME.registerComponent('fireflies', {
            init: function() {
                this.count = 500; this.range = 80;
                const geo = new THREE.SphereGeometry(0.04, 8, 8); 
                const mat = new THREE.MeshBasicMaterial({ color: '#FFFACD', transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
                this.mesh = new THREE.InstancedMesh(geo, mat, this.count);
                this.dummy = new THREE.Object3D(); this.offsets = new Float32Array(this.count); this.driftSpeeds = new Float32Array(this.count * 3);
                
                for(let i=0; i<this.count; i++) {
                    this.dummy.position.set((Math.random()-0.5)*this.range, Math.random()*15+1, (Math.random()-0.5)*this.range);
                    this.dummy.updateMatrix(); this.mesh.setMatrixAt(i, this.dummy.matrix);
                    this.offsets[i] = Math.random() * Math.PI * 2;
                    this.driftSpeeds[i*3] = (Math.random()-0.5)*0.8; this.driftSpeeds[i*3+1] = (Math.random()-0.5)*0.2; this.driftSpeeds[i*3+2] = (Math.random()-0.5)*0.8;
                }
                this.el.setObject3D('mesh', this.mesh);
            },
            tick: function(time) {
                if (!this.rig) this.rig = document.querySelector('#rig');
                if (!this.rig || !this.rig.object3D) return;

                const rigPos = this.rig.object3D.position; 
                const t = time * 0.001;
                
                for(let i=0; i<this.count; i++) {
                    this.mesh.getMatrixAt(i, this.dummy.matrix); this.dummy.position.setFromMatrixPosition(this.dummy.matrix);
                    this.dummy.position.x += Math.sin(t * this.driftSpeeds[i*3] + this.offsets[i]) * 0.05;
                    this.dummy.position.y += Math.sin(t * 2.0 + this.offsets[i]) * 0.01 + (this.driftSpeeds[i*3+1] * 0.01);
                    this.dummy.position.z += Math.cos(t * this.driftSpeeds[i*3+2] + this.offsets[i]) * 0.05;
                    this.dummy.scale.setScalar(0.3 + ((Math.sin(t*3.0+this.offsets[i])+1.0)*0.5) * 1.8);
                    let dx = this.dummy.position.x - rigPos.x; let dz = this.dummy.position.z - rigPos.z;
                    if (dx > this.range/2) this.dummy.position.x -= this.range; if (dx < -this.range/2) this.dummy.position.x += this.range;
                    if (dz > this.range/2) this.dummy.position.z -= this.range; if (dz < -this.range/2) this.dummy.position.z += this.range;
                    this.dummy.updateMatrix(); this.mesh.setMatrixAt(i, this.dummy.matrix);
                }
                this.mesh.instanceMatrix.needsUpdate = true;
            }
        });

        AFRAME.registerComponent('lumina-sparkles', {
            init: function() {
                this.count = 150;
                const geo = new THREE.OctahedronGeometry(0.02);
                const mat = new THREE.MeshBasicMaterial({ color: '#FFFACD', transparent: true, opacity: 1.0, blending: THREE.AdditiveBlending });
                this.mesh = new THREE.InstancedMesh(geo, mat, this.count);
                
                this.dummy = new THREE.Object3D();
                this.velocities = []; this.lifetimes = []; this.active = false;

                for(let i=0; i<this.count; i++) {
                    this.velocities.push(new THREE.Vector3()); this.lifetimes.push(0);
                    this.dummy.scale.set(0,0,0); this.dummy.updateMatrix(); this.mesh.setMatrixAt(i, this.dummy.matrix);
                }
                this.el.setObject3D('mesh', this.mesh);
                
                this.el.addEventListener('fire-sparkles', (e) => {
                    let pos = e.detail.position; this.active = true;
                    for(let i=0; i<this.count; i++) {
                        this.dummy.position.copy(pos);
                        let v = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
                        v.multiplyScalar(Math.random() * 4 + 1);
                        this.velocities[i].copy(v);
                        this.lifetimes[i] = Math.random() * 1.5 + 0.5;
                        this.dummy.scale.setScalar(1); this.dummy.updateMatrix(); this.mesh.setMatrixAt(i, this.dummy.matrix);
                    }
                    this.mesh.instanceMatrix.needsUpdate = true;
                });
            },
            tick: function(time, timeDelta) {
                if(!this.active) return;
                let dt = timeDelta / 1000; if (dt > 0.1) dt = 0.1;
                let allDead = true;
                for(let i=0; i<this.count; i++) {
                    if(this.lifetimes[i] > 0) {
                        allDead = false; this.lifetimes[i] -= dt;
                        this.mesh.getMatrixAt(i, this.dummy.matrix); this.dummy.position.setFromMatrixPosition(this.dummy.matrix);
                        
                        this.dummy.position.addScaledVector(this.velocities[i], dt);
                        this.velocities[i].multiplyScalar(0.92); 
                        this.velocities[i].y += 0.8 * dt; 
                        
                        let scale = Math.max(0, this.lifetimes[i]); this.dummy.scale.set(scale, scale, scale);
                        this.dummy.updateMatrix(); this.mesh.setMatrixAt(i, this.dummy.matrix);
                    }
                }
                this.mesh.instanceMatrix.needsUpdate = true;
                if(allDead) this.active = false;
            }
        });

        // =========================================================================
        // GLOWING HAND VISUALS
        // =========================================================================
        AFRAME.registerComponent('glow-hands', {
            init: function() {
                this.el.addEventListener('model-loaded', () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (mesh) {
                        mesh.traverse((node) => {
                            if (node.isMesh && node.material) {
                                // Overrides to create a glowing pink wireframe hand
                                node.material.color = new THREE.Color('#FFB6C1');
                                node.material.emissive = new THREE.Color('#FF1493');
                                node.material.emissiveIntensity = 0.8;
                                node.material.wireframe = true;
                                node.material.transparent = true;
                                node.material.opacity = 0.9;
                            }
                        });
                    }
                });
            }
        });

        // =========================================================================
        // PHYSICS, GRABBING, MAGIC & INSECT LOCOMOTION
        // =========================================================================
        AFRAME.registerComponent('nectar-physics', {
            schema: { bounce: { default: 0.7 }, gravity: { default: -9.8 }, floorY: { default: 0.25 } },
            init: function() { this.velocity = new THREE.Vector3(0,0,0); },
            tick: function(time, timeDelta) {
                if (this.el.getAttribute('data-grabbed') === 'true') return;
                let dt = timeDelta / 1000; if (dt > 0.1) dt = 0.1;
                let throwVel = this.el.getAttribute('data-throw-velocity');
                if (throwVel && typeof throwVel === 'string') {
                    let parts = throwVel.split(' ').map(Number); 
                    if (parts.length === 3) this.velocity.set(parts[0], parts[1], parts[2]); 
                    this.el.removeAttribute('data-throw-velocity');
                }
                this.velocity.y += this.data.gravity * dt;
                let pos = this.el.object3D.position;
                pos.x += this.velocity.x * dt; pos.y += this.velocity.y * dt; pos.z += this.velocity.z * dt;
                if (pos.y < this.data.floorY) {
                    pos.y = this.data.floorY; this.velocity.y *= -this.data.bounce; this.velocity.x *= 0.85; this.velocity.z *= 0.85;
                }
            }
        });

        AFRAME.registerComponent('hand-grabber', {
            init: function() {
                this.grabbedEl = null; this.prevPos = new THREE.Vector3(); this.throwVelocity = new THREE.Vector3(); this.grabRadius = 0.3; 
                this.el.addEventListener('pinchstarted', (evt) => {
                    if (!this.el.object3D) return;
                    let handPos = new THREE.Vector3(); this.el.object3D.getWorldPosition(handPos);
                    let orbs = document.querySelectorAll('.grabbable');
                    let closest = null; let minDistance = this.grabRadius;
                    orbs.forEach(orb => {
                        if(!orb.object3D) return;
                        let orbPos = new THREE.Vector3(); orb.object3D.getWorldPosition(orbPos);
                        let dist = handPos.distanceTo(orbPos);
                        if (dist < minDistance && orb.getAttribute('data-grabbed') !== 'true') { minDistance = dist; closest = orb; }
                    });
                    if (closest) {
                        this.grabbedEl = closest; this.grabbedEl.setAttribute('data-grabbed', 'true'); this.el.setAttribute('data-grabbing', 'true'); 
                    }
                });
                this.el.addEventListener('pinchended', () => {
                    if (this.grabbedEl) {
                        this.grabbedEl.setAttribute('data-grabbed', 'false');
                        this.grabbedEl.setAttribute('data-throw-velocity', `${this.throwVelocity.x} ${this.throwVelocity.y} ${this.throwVelocity.z}`);
                        this.grabbedEl = null; this.el.removeAttribute('data-grabbing');
                    }
                });
            },
            tick: function(time, timeDelta) {
                if (!this.el.object3D) return;
                let currentPos = new THREE.Vector3(); this.el.object3D.getWorldPosition(currentPos);
                let dt = timeDelta / 1000;
                if(dt > 0 && dt < 0.1) this.throwVelocity.subVectors(currentPos, this.prevPos).divideScalar(dt);
                this.prevPos.copy(currentPos);
                if (this.grabbedEl && this.el.sceneEl) {
                    this.el.sceneEl.object3D.updateMatrixWorld();
                    let localPos = this.el.sceneEl.object3D.worldToLocal(currentPos.clone()); 
                    this.grabbedEl.setAttribute('position', localPos);
                }
            }
        });

        AFRAME.registerComponent('gesture-magic', {
            init: function() { this.cooldown = 0; },
            tick: function(time, timeDelta) {
                if (!this.left) this.left = document.querySelector('#leftHand');
                if (!this.right) this.right = document.querySelector('#rightHand');
                if (!this.shockwave) this.shockwave = document.querySelector('#magic-shockwave');
                if (!this.sparkles) this.sparkles = document.querySelector('#lumina-system');
                if (!this.left || !this.left.object3D || !this.right || !this.right.object3D || !this.shockwave || !this.sparkles) return;
                
                let dt = timeDelta / 1000; if(this.cooldown > 0) this.cooldown -= dt;
                let pL = new THREE.Vector3(); let pR = new THREE.Vector3();
                this.left.object3D.getWorldPosition(pL); this.right.object3D.getWorldPosition(pR);

                if (pL.distanceTo(pR) > 0.01 && pL.distanceTo(pR) < 0.10 && this.cooldown <= 0) { 
                    this.cooldown = 2.0; 
                    let cx = (pL.x + pR.x) / 2; let cy = (pL.y + pR.y) / 2; let cz = (pL.z + pR.z) / 2;
                    let centerPos = new THREE.Vector3(cx, cy, cz);
                    this.shockwave.setAttribute('position', `${cx} ${cy} ${cz}`);
                    this.shockwave.emit('fire-shockwave', null, false);
                    this.sparkles.emit('fire-sparkles', { position: centerPos }, false);
                }
            }
        });

        /**
         * TRUE 3D HOVER LOCOMOTION
         * Uses WebXR joints to set an anchor on pinch, steer in 3D, and STOP on fist gesture.
         */
        AFRAME.registerComponent('insect-flight', {
            schema: { 
                maxSpeed: { type: 'number', default: 35.0 }, 
                acceleration: { type: 'number', default: 12.0 }, 
                damping: { type: 'number', default: 0.90 },
                deadzone: { type: 'number', default: 0.04 },
                sensitivity: { type: 'number', default: 15.0 }
            },
            init: function () {
                this.state = 'IDLE'; 
                this.activeHandEl = null;
                this.activeHandness = null;
                this.anchor = new THREE.Vector3();
                this.velocity = new THREE.Vector3();
                
                this.cameraForward = new THREE.Vector3();
                this.cameraRight = new THREE.Vector3();
                this.cameraUp = new THREE.Vector3();
                this.camera = document.querySelector('#camera');

                this.onPinchStart = this.onPinchStart.bind(this);
            },
            play: function () {
                const attachEvents = (hand) => { hand.addEventListener('pinchstarted', this.onPinchStart); };
                document.querySelectorAll('[hand-tracking-controls]').forEach(attachEvents);
                this.el.sceneEl.addEventListener('child-attached', (evt) => { if (evt.detail.el.hasAttribute('hand-tracking-controls')) attachEvents(evt.detail.el); });
            },
            onPinchStart: function (evt) {
                if (this.state === 'FLYING') return; 
                // Delay to check if orb grabber intercepted the pinch
                setTimeout(() => {
                    if (evt.target.getAttribute('data-grabbing') === 'true') return; 
                    this.activeHandEl = evt.target;
                    this.activeHandness = this.activeHandEl.getAttribute('hand-tracking-controls').hand;
                    this.state = 'INIT_ANCHOR';
                }, 10);
            },
            tick: function (time, timeDelta) {
                let dt = timeDelta / 1000; if (dt > 0.1) dt = 0.1;
                let targetVel = new THREE.Vector3(0,0,0);

                const session = this.el.sceneEl.renderer.xr ? this.el.sceneEl.renderer.xr.getSession() : null;
                if (session && this.activeHandEl) {
                    const frame = this.el.sceneEl.frame;
                    const refSpace = this.el.sceneEl.renderer.xr.getReferenceSpace();
                    
                    let inputSource = null;
                    for (let src of session.inputSources) {
                        if (src.hand && src.handedness === this.activeHandness) { inputSource = src; break; }
                    }

                    if (inputSource && frame && refSpace) {
                        const wristPose = frame.getJointPose(inputSource.hand.get('wrist'), refSpace);
                        const indexPose = frame.getJointPose(inputSource.hand.get('index-finger-tip'), refSpace);
                        const pinkyPose = frame.getJointPose(inputSource.hand.get('pinky-finger-tip'), refSpace);

                        if (wristPose && indexPose && pinkyPose) {
                            const wp = wristPose.transform.position;
                            const ip = indexPose.transform.position;
                            const pp = pinkyPose.transform.position;

                            // FIST DETECTION MATH
                            const distIndex = Math.sqrt((wp.x-ip.x)**2 + (wp.y-ip.y)**2 + (wp.z-ip.z)**2);
                            const distPinky = Math.sqrt((wp.x-pp.x)**2 + (wp.y-pp.y)**2 + (wp.z-pp.z)**2);
                            const isFist = distIndex < 0.11 && distPinky < 0.11;

                            if (this.state === 'INIT_ANCHOR') {
                                this.anchor.set(wp.x, wp.y, wp.z);
                                this.state = 'FLYING';
                            } 
                            else if (this.state === 'FLYING') {
                                if (isFist) {
                                    // FIST DETECTED -> CUT ENGINE & STOP
                                    this.state = 'IDLE';
                                    this.activeHandEl = null;
                                } else {
                                    // CALCULATE 3D JOYSTICK VECTOR
                                    let dX = wp.x - this.anchor.x;
                                    let dY = wp.y - this.anchor.y;
                                    let dZ = wp.z - this.anchor.z;

                                    let tz = Math.abs(dZ) > this.data.deadzone ? dZ + (dZ > 0 ? -this.data.deadzone : this.data.deadzone) : 0;
                                    let tx = Math.abs(dX) > this.data.deadzone ? dX + (dX > 0 ? -this.data.deadzone : this.data.deadzone) : 0;
                                    let ty = Math.abs(dY) > this.data.deadzone ? dY + (dY > 0 ? -this.data.deadzone : this.data.deadzone) : 0;

                                    const headObj = this.camera.object3D;
                                    this.cameraForward.set(0, 0, -1).applyQuaternion(headObj.quaternion);
                                    this.cameraRight.set(1, 0, 0).applyQuaternion(headObj.quaternion);
                                    this.cameraUp.set(0, 1, 0).applyQuaternion(headObj.quaternion);

                                    targetVel.addScaledVector(this.cameraForward, -tz * this.data.sensitivity);
                                    targetVel.addScaledVector(this.cameraRight, tx * this.data.sensitivity);
                                    targetVel.addScaledVector(this.cameraUp, ty * this.data.sensitivity);
                                }
                            }
                        }
                    }
                } else if (this.state === 'FLYING') {
                    // Failsafe drop if tracking lost
                    this.state = 'IDLE';
                    this.activeHandEl = null;
                }

                if (targetVel.length() > this.data.maxSpeed) {
                    targetVel.normalize().multiplyScalar(this.data.maxSpeed);
                }

                if (this.state === 'FLYING') {
                    this.velocity.lerp(targetVel, dt * this.data.acceleration);
                } else {
                    let friction = Math.pow(this.data.damping, dt * 60); 
                    this.velocity.multiplyScalar(friction);
                }
                
                if (this.velocity.lengthSq() > 0.001) {
                    let moveStep = this.velocity.clone().multiplyScalar(dt); 
                    this.el.object3D.position.add(moveStep);
                }
                
                // STRICT WORLD LIMITS (Clamped completely within the 400m Tulip field)
                let pos = this.el.object3D.position;
                const limit = 300; // Stop safely before the edge
                if (pos.x > limit) { pos.x = limit; this.velocity.x = 0; }
                if (pos.x < -limit) { pos.x = -limit; this.velocity.x = 0; }
                if (pos.z > limit) { pos.z = limit; this.velocity.z = 0; }
                if (pos.z < -limit) { pos.z = -limit; this.velocity.z = 0; }
                if (pos.y < 0) { pos.y = 0; this.velocity.y = 0; }
                if (pos.y > 180) { pos.y = 180; this.velocity.y = 0; }
            }
        });
    </script>
</head>
<body>
    <a-scene day-night-cycle="duration: 120000" fog="type: exponential; density: 0.015;" webxr="optionalFeatures: hand-tracking;">
        
        <a-entity gesture-magic></a-entity>

        <!-- Dynamic Lighting & Sky Engine -->
        <a-sky material="shader: sky-gradient; side: back; colorTop: #90CAF9; colorBottom: #E3F2FD;"></a-sky>
        
        <a-entity starry-sky></a-entity>
        
        <a-entity id="orbiting-sun" position="0 250 0">
            <a-light id="sun-light" type="directional" color="#FFFFFF" intensity="1.4" castShadow="false"></a-light>
        </a-entity>
        
        <a-entity id="orbiting-moon" position="0 -250 0">
            <a-light id="moon-light" type="directional" color="#AACCFF" intensity="0.0" castShadow="false"></a-light>
        </a-entity>
        
        <a-light id="ambient-light" type="ambient" color="#FFDAB9" intensity="0.8"></a-light>

        <!-- Environment -->
        <a-entity milky-clouds></a-entity>
        <a-entity giant-flowers></a-entity>
        <a-entity giant-grass></a-entity>
        <a-entity fireflies></a-entity>
        <a-plane position="0 0 0" rotation="-90 0 0" width="800" height="800" material="color: #2F4F4F; roughness: 1.0; metalness: 0.0;"></a-plane>

        <!-- REVOLVING GEM ORBS -->
        <a-entity class="grabbable" nectar-physics position="-1.0 1.2 -1.5">
            <a-octahedron radius="0.12" material="color: #00FFAA; shader: flat; transparent: true; opacity: 0.85;" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear;"></a-octahedron>
            <a-torus radius="0.2" radius-tubular="0.005" material="color: #FFFFFF; shader: flat; transparent: true; opacity: 0.6;" animation="property: rotation; to: 360 360 0; loop: true; dur: 5000; easing: linear;"></a-torus>
        </a-entity>

        <a-entity class="grabbable" nectar-physics position="0 1.2 -2.0">
            <a-octahedron radius="0.12" material="color: #FF00AA; shader: flat; transparent: true; opacity: 0.85;" animation="property: rotation; to: 0 360 0; loop: true; dur: 3500; easing: linear;"></a-octahedron>
            <a-torus radius="0.2" radius-tubular="0.005" material="color: #FFFFFF; shader: flat; transparent: true; opacity: 0.6;" animation="property: rotation; to: -360 -360 0; loop: true; dur: 4500; easing: linear;"></a-torus>
        </a-entity>

        <a-entity class="grabbable" nectar-physics position="1.0 1.2 -1.5">
            <a-octahedron radius="0.12" material="color: #AA00FF; shader: flat; transparent: true; opacity: 0.85;" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear;"></a-octahedron>
            <a-torus radius="0.2" radius-tubular="0.005" material="color: #FFFFFF; shader: flat; transparent: true; opacity: 0.6;" animation="property: rotation; to: 360 0 360; loop: true; dur: 6000; easing: linear;"></a-torus>
        </a-entity>

        <!-- MAGIC CLAP EFFECTS -->
        <a-torus id="magic-shockwave" radius="1" radius-tubular="0.05" rotation="90 0 0" 
                 material="color: #FFFFFF; shader: flat; transparent: true; opacity: 0.0;" scale="0.1 0.1 0.1"
                 animation__scale="property: scale; to: 30 30 30; dur: 800; easing: easeOutQuad; startEvents: fire-shockwave;"
                 animation__fade="property: material.opacity; from: 1.0; to: 0.0; dur: 800; easing: easeOutQuad; startEvents: fire-shockwave;">
        </a-torus>
        
        <a-entity id="lumina-system" lumina-sparkles></a-entity>

        <!-- EMBELLISHED INSTRUCTION BOARD -->
        <a-entity position="0 1.6 -1.6" rotation="-10 0 0">
            <a-plane width="1.6" height="1.0" material="color: #FFFFFF; transparent: true; opacity: 0.15; roughness: 0.1; metalness: 0.8;" position="0 0 0"></a-plane>
            <a-plane width="1.5" height="0.9" material="color: #111111; transparent: true; opacity: 0.6; shader: flat;" position="0 0 0.01"></a-plane>
            <a-box width="1.64" height="1.04" depth="0.02" material="color: #FFD700; metalness: 0.8; roughness: 0.3;" position="0 0 -0.015"></a-box>
            
            <a-cylinder radius="0.04" height="0.04" rotation="90 0 0" position="-0.8 0.5 0.02" material="color: #FFD700; metalness: 0.8; roughness: 0.2;"></a-cylinder>
            <a-cylinder radius="0.04" height="0.04" rotation="90 0 0" position="0.8 0.5 0.02" material="color: #FFD700; metalness: 0.8; roughness: 0.2;"></a-cylinder>
            <a-cylinder radius="0.04" height="0.04" rotation="90 0 0" position="-0.8 -0.5 0.02" material="color: #FFD700; metalness: 0.8; roughness: 0.2;"></a-cylinder>
            <a-cylinder radius="0.04" height="0.04" rotation="90 0 0" position="0.8 -0.5 0.02" material="color: #FFD700; metalness: 0.8; roughness: 0.2;"></a-cylinder>

            <a-text value="BEE IN THE TULIPS" font="exo2bold" color="#FFFACD" width="2.2" position="0 0.35 0.02" align="center" letter-spacing="2"></a-text>
            <a-plane width="1.4" height="0.01" position="0 0.25 0.02" material="color: #FFD700; shader: flat;"></a-plane>
            
            <!-- Updated flight instructions to reflect new 3D joystick / fist stop logic -->
            <a-text value="FLYING:" font="exo2bold" color="#FFB6C1" width="1.2" position="-0.65 0.12 0.02"></a-text>
            <a-text value="PINCH to set anchor. \nPUSH hand relative to anchor to glide 3D.\nMAKE A FIST to instantly hit the brakes!" font="roboto" color="#FFFFFF" width="1.2" position="-0.65 0.00 0.02"></a-text>
            
            <a-text value="GRABBING:" font="exo2bold" color="#00FFAA" width="1.2" position="-0.65 -0.15 0.02"></a-text>
            <a-text value="PINCH near revolving gems to pick them up.\nRELEASE hand while moving to throw them!" font="roboto" color="#FFFFFF" width="1.2" position="-0.65 -0.27 0.02"></a-text>

            <a-text value="MAGIC GESTURE: CLAP YOUR HANDS" font="exo2bold" color="#FFD700" width="1.2" position="0 -0.38 0.02" align="center"></a-text>
        </a-entity>

        <!-- PLAYER RIG & NEW GLOWING HANDS -->
        <a-entity id="rig" insect-flight="maxSpeed: 40.0;">
            <a-camera id="camera" position="0 1.6 0"></a-camera>
            <a-entity id="leftHand" hand-tracking-controls="hand: left; modelStyle: mesh;" hand-grabber glow-hands></a-entity>
            <a-entity id="rightHand" hand-tracking-controls="hand: right; modelStyle: mesh;" hand-grabber glow-hands></a-entity>
        </a-entity>

    </a-scene>
</body>
</html>
