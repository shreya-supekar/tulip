<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect Flight Locomotion</title>
    
    <!-- A-Frame 1.5.0 library -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
        /**
         * 0. CUSTOM GRADIENT SKY SHADER
         * Creates a smooth, beautiful sunset transition without harsh bands.
         */
        AFRAME.registerShader('sky-gradient', {
            schema: {
                colorTop: { type: 'color', default: '#3B185F' },    // Deep twilight purple
                colorBottom: { type: 'color', default: '#FFB6C1' }  // Soft peach/pink
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPosition.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 colorTop;
                uniform vec3 colorBottom;
                varying vec3 vWorldPosition;
                void main() {
                    vec3 pointOnSphere = normalize(vWorldPosition.xyz);
                    // Map Y from [-1, 1] to [0, 1]
                    float f = (pointOnSphere.y + 1.0) / 2.0; 
                    // Push the gradient down slightly
                    f = smoothstep(0.2, 0.8, f); 
                    gl_FragColor = vec4(mix(colorBottom, colorTop, f), 1.0);
                }
            `
        });

        /**
         * 1. GIANT INSTANCED FLOWER FIELD
         * Renders massive tulips (30m tall) to make the player feel insect-sized.
         */
        AFRAME.registerComponent('giant-flowers', {
            init: function () {
                const count = 3000; // Fewer needed because they are HUGE
                const range = 400;  // 400m spread
                
                // MASSIVE Tulip Stem Geometry
                const stemGeo = new THREE.CylinderGeometry(0.3, 0.6, 30, 8);
                stemGeo.translate(0, 15, 0); 
                const stemMat = new THREE.MeshLambertMaterial({ color: '#5C9E7A' });
                const stems = new THREE.InstancedMesh(stemGeo, stemMat, count);
                
                // MASSIVE Tulip Bulb Geometry (Stretched sphere for soft organic look)
                const bulbGeo = new THREE.SphereGeometry(3, 16, 16);
                bulbGeo.scale(1, 1.6, 1); // Stretch vertically into a closed bud
                bulbGeo.translate(0, 32, 0); // Sit on top of stem
                const bulbMat = new THREE.MeshLambertMaterial({ color: '#ffffff' }); 
                const bulbs = new THREE.InstancedMesh(bulbGeo, bulbMat, count);

                const dummy = new THREE.Object3D();
                const colorObj = new THREE.Color();
                const palette = ['#FF9A8B', '#FFB6C1', '#FFFACD', '#FFD700', '#FF7E67'];

                for (let i = 0; i < count; i++) {
                    let x = (Math.random() - 0.5) * range;
                    let z = (Math.random() - 0.5) * range;
                    
                    // Clear a 10m spawn radius
                    if (Math.abs(x) < 10 && Math.abs(z) < 10) continue;

                    dummy.position.set(x, -2, z); // Sink into ground slightly
                    
                    // Organic lean and rotation
                    dummy.rotation.y = Math.random() * Math.PI * 2;
                    dummy.rotation.z = (Math.random() - 0.5) * 0.15; 
                    dummy.rotation.x = (Math.random() - 0.5) * 0.15;
                    
                    // Varying sizes
                    let scale = Math.random() * 0.6 + 0.7;
                    dummy.scale.set(scale, scale + (Math.random()*0.3), scale);
                    
                    dummy.updateMatrix();
                    stems.setMatrixAt(i, dummy.matrix);
                    bulbs.setMatrixAt(i, dummy.matrix);
                    
                    colorObj.set(palette[Math.floor(Math.random() * palette.length)]);
                    bulbs.setColorAt(i, colorObj);
                }

                this.el.setObject3D('stems', stems);
                this.el.setObject3D('bulbs', bulbs);
            }
        });

        /**
         * 2. GIANT GRASS BLADES
         * Fills the floor with towering grass (10m tall) to complete the insect scale.
         */
        AFRAME.registerComponent('giant-grass', {
            init: function() {
                const count = 15000;
                const range = 300;
                
                // Blade geometry
                const grassGeo = new THREE.ConeGeometry(0.4, 12, 4);
                grassGeo.translate(0, 6, 0);
                const grassMat = new THREE.MeshLambertMaterial({ color: '#4A7C59' });
                const grass = new THREE.InstancedMesh(grassGeo, grassMat, count);
                
                const dummy = new THREE.Object3D();
                for(let i=0; i<count; i++) {
                    let x = (Math.random() - 0.5) * range;
                    let z = (Math.random() - 0.5) * range;
                    dummy.position.set(x, -1, z);
                    
                    // Bend grass in random directions
                    dummy.rotation.y = Math.random() * Math.PI * 2;
                    dummy.rotation.x = (Math.random() - 0.5) * 0.4;
                    dummy.rotation.z = (Math.random() - 0.5) * 0.4;
                    dummy.scale.setScalar(Math.random() * 0.5 + 0.5);
                    
                    dummy.updateMatrix();
                    grass.setMatrixAt(i, dummy.matrix);
                }
                this.el.setObject3D('grass', grass);
            }
        });

        /**
         * 3. FLOATING FIREFLIES / SPORES (Low-Mid Level detail)
         */
        AFRAME.registerComponent('fireflies', {
            init: function() {
                this.count = 400;
                this.range = 80;
                const geo = new THREE.SphereGeometry(0.1, 8, 8); // Large glowing orbs
                const mat = new THREE.MeshBasicMaterial({ color: '#FFFACD', transparent: true, opacity: 0.8 });
                this.mesh = new THREE.InstancedMesh(geo, mat, this.count);
                
                this.dummy = new THREE.Object3D();
                this.offsets = new Float32Array(this.count); // For bobbing animation
                
                for(let i=0; i<this.count; i++) {
                    let x = (Math.random() - 0.5) * this.range;
                    let y = Math.random() * 15 + 1; // Hover between 1m and 16m high
                    let z = (Math.random() - 0.5) * this.range;
                    this.dummy.position.set(x, y, z);
                    this.dummy.updateMatrix();
                    this.mesh.setMatrixAt(i, this.dummy.matrix);
                    this.offsets[i] = Math.random() * Math.PI * 2;
                }
                this.el.setObject3D('mesh', this.mesh);
            },
            tick: function(time) {
                const rigPos = document.querySelector('#rig').object3D.position;
                const t = time * 0.001;
                
                for(let i=0; i<this.count; i++) {
                    this.mesh.getMatrixAt(i, this.dummy.matrix);
                    this.dummy.position.setFromMatrixPosition(this.dummy.matrix);
                    
                    // Gentle vertical bobbing
                    this.dummy.position.y += Math.sin(t * 2.0 + this.offsets[i]) * 0.01;
                    
                    // Wrap around player
                    let dx = this.dummy.position.x - rigPos.x;
                    let dz = this.dummy.position.z - rigPos.z;
                    if (dx > this.range/2) this.dummy.position.x -= this.range;
                    if (dx < -this.range/2) this.dummy.position.x += this.range;
                    if (dz > this.range/2) this.dummy.position.z -= this.range;
                    if (dz < -this.range/2) this.dummy.position.z += this.range;

                    this.dummy.updateMatrix();
                    this.mesh.setMatrixAt(i, this.dummy.matrix);
                }
                this.mesh.instanceMatrix.needsUpdate = true;
            }
        });

        /**
         * 4. GIANT TREES (High Level Composition)
         */
        AFRAME.registerComponent('giant-trees', {
            init: function() {
                const numTrees = 15;
                for (let i = 0; i < numTrees; i++) {
                    let tree = document.createElement('a-entity');
                    
                    let x = (Math.random() - 0.5) * 350;
                    let z = (Math.random() - 0.5) * 350;
                    if (Math.abs(x) < 40 && Math.abs(z) < 40) continue; // Keep center somewhat open
                    
                    tree.setAttribute('position', { x: x, y: 0, z: z });
                    
                    // Massive Trunk
                    let trunk = document.createElement('a-cylinder');
                    trunk.setAttribute('radius', Math.random() * 4 + 4);
                    trunk.setAttribute('height', 120);
                    trunk.setAttribute('position', '0 60 0');
                    trunk.setAttribute('color', '#3E2723');
                    trunk.setAttribute('roughness', '1.0');
                    
                    // Massive Canopy (Soft sphere)
                    let canopy = document.createElement('a-sphere');
                    canopy.setAttribute('radius', Math.random() * 15 + 25);
                    canopy.setAttribute('position', '0 115 0');
                    canopy.setAttribute('color', '#2E4C38');
                    canopy.setAttribute('roughness', '0.9');

                    tree.appendChild(trunk);
                    tree.appendChild(canopy);
                    this.el.appendChild(tree);
                }
            }
        });

        /**
         * 5. SEAMLESS SUPERMAN GLIDE (Scaled up for huge world)
         */
        AFRAME.registerComponent('superman-flight', {
            schema: {
                maxSpeed: { type: 'number', default: 45.0 }, // Increased speed for giant world
                acceleration: { type: 'number', default: 15.0 },
                damping: { type: 'number', default: 0.94 }
            },

            init: function () {
                this.activeHand = null;
                this.isFlying = false;
                this.velocity = new THREE.Vector3();
                this.flightDir = new THREE.Vector3();
                this.camera = document.querySelector('#camera');
                
                this.onPinchStart = this.onPinchStart.bind(this);
                this.onPinchEnd = this.onPinchEnd.bind(this);
            },

            play: function () {
                const attachEvents = (hand) => {
                    hand.addEventListener('pinchstarted', this.onPinchStart);
                    hand.addEventListener('pinchended', this.onPinchEnd);
                };

                document.querySelectorAll('[hand-tracking-controls]').forEach(attachEvents);
                this.el.sceneEl.addEventListener('child-attached', (evt) => {
                    if (evt.detail.el.hasAttribute('hand-tracking-controls')) {
                        attachEvents(evt.detail.el);
                    }
                });
            },

            onPinchStart: function (evt) {
                if (this.isFlying) return; 
                this.activeHand = evt.target;
                this.isFlying = true;
            },

            onPinchEnd: function (evt) {
                if (this.activeHand === evt.target) {
                    this.isFlying = false;
                    this.activeHand = null;
                }
            },
            
            tick: function (time, timeDelta) {
                let dt = timeDelta / 1000;
                if (dt > 0.1) dt = 0.1;

                if (this.isFlying && this.activeHand) {
                    let headPos = new THREE.Vector3();
                    this.camera.object3D.getWorldPosition(headPos);
                    
                    let handPos = new THREE.Vector3();
                    this.activeHand.object3D.getWorldPosition(handPos);

                    this.flightDir.subVectors(handPos, headPos);
                    
                    let stretch = this.flightDir.length(); 
                    this.flightDir.normalize();

                    // Deadzone 20cm, Max thrust at 50cm
                    let throttle = 0;
                    if (stretch > 0.2) {
                        throttle = Math.min((stretch - 0.2) / 0.3, 1.0); 
                    }

                    let targetVelocity = this.flightDir.multiplyScalar(this.data.maxSpeed * throttle);
                    this.velocity.lerp(targetVelocity, dt * this.data.acceleration);
                    
                } else {
                    let friction = Math.pow(this.data.damping, dt * 60);
                    this.velocity.multiplyScalar(friction);
                }

                if (this.velocity.lengthSq() > 0.001) {
                    let moveStep = this.velocity.clone().multiplyScalar(dt);
                    this.el.object3D.position.add(moveStep);
                }

                let pos = this.el.object3D.position;
                if (pos.y < 0) {
                    pos.y = 0;
                    this.velocity.y = 0;
                }
                if (pos.y > 150) { // Ceiling height
                    pos.y = 150;
                    this.velocity.y = 0;
                }
            }
        });
    </script>
</head>
<body>
    <a-scene 
        fog="type: exponential; color: #FFA07A; density: 0.008;" 
        webxr="optionalFeatures: hand-tracking;">
        
        <!-- ========================================== -->
        <!-- ATMOSPHERE & LIGHTING                      -->
        <!-- ========================================== -->
        
        <!-- Custom Sunset Gradient Sky -->
        <a-sky material="shader: sky-gradient; side: back;"></a-sky>

        <!-- Ambient Hazy Sun -->
        <a-sphere position="-100 40 -200" radius="25" material="color: #FFFACD; shader: flat; transparent: true; opacity: 0.9;"></a-sphere>
        <a-light type="directional" color="#FFE4B5" intensity="1.4" position="-100 40 -200" castShadow="false"></a-light>
        <a-light type="ambient" color="#FFDAB9" intensity="0.5"></a-light>
        <a-light type="hemisphere" color="#FFFFFF" groundColor="#2E4C38" intensity="0.6"></a-light>

        <!-- ========================================== -->
        <!-- INSECT-SCALE ENVIRONMENT                   -->
        <!-- ========================================== -->

        <a-entity giant-trees></a-entity>
        <a-entity giant-flowers></a-entity>
        <a-entity giant-grass></a-entity>
        <a-entity fireflies></a-entity>

        <!-- Soft Forest Floor -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="800" height="800" 
                 material="color: #2F4F4F; roughness: 1.0; metalness: 0.0;"></a-plane>


        <!-- ========================================== -->
        <!-- SLEEK FLOATING INSTRUCTION PANEL           -->
        <!-- ========================================== -->
        <a-entity position="0 1.4 -1.2" rotation="-10 0 0">
            <!-- Dark Glass Base -->
            <a-plane width="1.1" height="0.55" 
                     material="color: #111111; transparent: true; opacity: 0.75; shader: flat;" 
                     position="0 0 0"></a-plane>
            
            <!-- Glowing Accent Line -->
            <a-plane width="1.1" height="0.02" position="0 0.265 0.01"
                     material="color: #FFB6C1; shader: flat;"></a-plane>

            <!-- Typography -->
            <a-text value="FLIGHT CONTROLS" 
                    font="exo2bold" color="#FFFACD" width="1.8" position="0 0.18 0.02" align="center" letter-spacing="2"></a-text>
            
            <a-text value="PINCH to ignite thrusters." 
                    font="roboto" color="#FFFFFF" width="1.1" position="-0.45 0.05 0.02" align="left"></a-text>
            
            <a-text value="STEER by pointing your hand out.\nThe further you reach, the faster you fly." 
                    font="roboto" color="#AAAAAA" width="1.1" position="-0.45 -0.07 0.02" align="left"></a-text>
            
            <a-text value="RELEASE pinch to hover gracefully." 
                    font="roboto" color="#FFB6C1" width="1.1" position="-0.45 -0.19 0.02" align="left"></a-text>
        </a-entity>


        <!-- ========================================== -->
        <!-- PLAYER RIG                                 -->
        <!-- ========================================== -->
        
        <!-- Max speed increased to 45m/s to navigate the giant world gracefully -->
        <a-entity id="rig" superman-flight="maxSpeed: 45.0; acceleration: 15.0; damping: 0.94;">
            
            <a-camera id="camera" position="0 1.6 0"></a-camera>
            
            <a-entity id="leftHand" hand-tracking-controls="hand: left; modelStyle: dots; modelColor: #FFB6C1;"></a-entity>
            <a-entity id="rightHand" hand-tracking-controls="hand: right; modelStyle: dots; modelColor: #FFB6C1;"></a-entity>
            
        </a-entity>

    </a-scene>
</body>
</html>
